# --
# submission information

# Submision
submission:
  # Submission label
  # Label is used to index submissions, to avoid overlapping codes among submissions
  # use the following way to form your label:
  # [Last name of corresponding author]_[Abbreviation of institute of the corresponding author]_task[task number]_[index number of your submission (1-4)]
  label: xxx

  # Submission name
  # This name will be used in the results tables when space permits
  name: xxx

  # Submission name abbreviated
  # This abbreviated name will be used in the results table when space is tight, maximum 10 characters
  abbreviation: xxx

  # Submission authors in order, mark one of the authors as corresponding author.
  authors:
    # First author
    - lastname: xxx
      firstname: xxx
      email: xxx
      corresponding: true

      # Affiliation information for the author
      affiliation:
        abbreviation: xxx
        institute: xxx
        department: xxx
        location: xxx

  # if coding agents (openClaw) were used, yes or no
  coding_agents_ai_used: !!null


# System information
system:
  # Multi-channel alignment system description, meta data provided here will be used to do
  # meta analysis of the submitted system. Use general level tags, if possible use the tags provided in comments.
  # If information field is not applicable to the system, use "!!null".
  description:

    # Machine learning framework: pytorch, tensorflow
    machine_learning_framework: !!null

    # Acoustic representation
    acoustic_features: log mel spectrogram

    # Data augmentation methods
    data_augmentation: !!null

    # Embeddings
    embeddings: !!null

    # model architecture, describe shortly what model type was used, e.g. self defined CNN, MobileNet, ...
    model_architecture: !!null

    # What kind of loss function was used during model training?
    training_objective: cross entropy

    # What kind of model compression techniques were used, if any?
    # e.g. Pruning, quantization, knowledge-distillation, ...
    model_compression: !!null

    # External data usage method
    external_data_usage: !!null

  # URL to the source code of the system [optional, highly recommended]
  source_code: !!null

  # List of external datasets used in the submission.
  external_datasets:
    # Dataset name
    - name: !!null
      # Dataset access url
      url: !!null
      # Total audio length in minutes
      total_audio_length: !!null

# Results
results:

  # Classification scores, the subscript "inference" indicates the trained model and "tflite" indicates its tflite version.
  accuracy_inference: N/A
  accuracy_tflite: N/A
  roc_auc_inference: N/A
  roc_auc_tflite: N/A

  # Resource efficiency
  model_size_inference_bytes: N/A
  model_size_tflite_bytes: N/A
  macs_inference: N/A
  macs_tflite: N/A
  num_params_inference: N/A
  num_params_tflite: N/A

  # Embedded model measured on hardware
  embedded_time_ms_setup: N/A
  embedded_time_ms_preprocessing: N/A
  embedded_time_ms_model: N/A
  embedded_time_ms_total: N/A
  embedded_ram_usage_bytes: N/A
