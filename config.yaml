# --
# config for biodcase 2026 - tiny ml (task 3)

# version id
version: 0.1

# dataset
dataset:

  # root path
  root_path: /to/dataset
  cache_path: /to/cached

  # folder structure, splits
  train_folder: train
  validation_folder: validation
  test_folder: test


# pipeline
pipeline:

  # data preprocessing
  data_preprocessing:
    audio_slice_duration_ms: 3000
    sample_rate: 16000

  # feature extraction
  feature_extraction:
    window_len: 4096
    window_stride: 512
    window_scaling_bits: 12
    mel_n_channels: 40
    mel_low_hz: 125
    mel_high_hz: 7500
    mel_post_scaling_bits: 6

  # model training
  model_training:
    seed: 42
    n_epochs: 20
    shuffle_buff_n: 10000
    batch_size: 128
    early_stopping:
      patience: 5

  # embedded code
  embedded_code_generation:

    # replace with your serial device
    serial_device: "/dev/ttyUSB0"